<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" width="780" height="580">
  <style>
    .gallery { fill: #F2D6B3; stroke: #2a2a2a; stroke-width: 1.5; rx: 3; }
    .gallery-geffen { fill: #E8C49A; stroke: #2a2a2a; stroke-width: 1.5; rx: 3; }
    .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #2a2a2a; text-anchor: middle; dominant-baseline: central; }
    .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #888; text-anchor: middle; }
    .floor-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 42px; font-weight: 900; fill: #ddd; }
    .wing-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #aaa; letter-spacing: 0.5px; }
    .outline { fill: #f8f6f3; stroke: #ccc; stroke-width: 1; }
    .corridor { fill: #eee; }
  </style>

  <!-- Background -->
  <rect width="780" height="580" fill="#fafafa" rx="8"/>

  <!-- Floor number watermark -->
  <text x="700" y="560" class="floor-label">5</text>

  <!-- Main building outline -->
  <rect x="15" y="20" width="750" height="540" class="outline" rx="4"/>

  <!-- Corridors / hallways -->
  <rect x="260" y="145" width="30" height="105" class="corridor"/>
  <rect x="140" y="235" width="150" height="20" class="corridor"/>
  <rect x="270" y="375" width="120" height="20" class="corridor"/>
  <rect x="140" y="425" width="150" height="20" class="corridor"/>

  <!-- === TOP ROW === -->
  <rect x="20" y="25" width="80" height="110" class="gallery-geffen" rx="3"/>
  <text x="60" y="80" class="label">510</text>

  <rect x="105" y="25" width="85" height="110" class="gallery-geffen" rx="3"/>
  <text x="147" y="80" class="label">509</text>

  <rect x="195" y="25" width="100" height="110" class="gallery-geffen" rx="3"/>
  <text x="245" y="80" class="label">508</text>

  <rect x="310" y="25" width="65" height="110" class="gallery" rx="3"/>
  <text x="342" y="80" class="label">507</text>

  <rect x="380" y="25" width="65" height="110" class="gallery" rx="3"/>
  <text x="412" y="80" class="label">505</text>

  <rect x="450" y="25" width="130" height="110" class="gallery" rx="3"/>
  <text x="515" y="80" class="label">503</text>

  <rect x="585" y="25" width="120" height="110" class="gallery" rx="3"/>
  <text x="645" y="80" class="label">502</text>

  <!-- === SECOND ROW === -->
  <rect x="450" y="145" width="80" height="100" class="gallery" rx="3"/>
  <text x="490" y="195" class="label">504</text>

  <rect x="535" y="145" width="110" height="100" class="gallery" rx="3"/>
  <text x="590" y="195" class="label">501</text>

  <rect x="660" y="100" width="95" height="90" class="gallery" rx="3"/>
  <text x="707" y="145" class="label">500</text>

  <!-- === LEFT COLUMN === -->
  <rect x="20" y="145" width="120" height="85" class="gallery-geffen" rx="3"/>
  <text x="80" y="188" class="label">511</text>

  <rect x="20" y="260" width="95" height="100" class="gallery-geffen" rx="3"/>
  <text x="68" y="310" class="label">512</text>

  <rect x="20" y="365" width="100" height="80" class="gallery-geffen" rx="3"/>
  <text x="70" y="405" class="label">513</text>

  <!-- === CENTER GALLERIES === -->
  <rect x="175" y="260" width="120" height="110" class="gallery" rx="3"/>
  <text x="235" y="315" class="label">516</text>

  <rect x="305" y="195" width="110" height="90" class="gallery" rx="3"/>
  <text x="360" y="240" class="label">506</text>

  <rect x="310" y="295" width="110" height="100" class="gallery" rx="3"/>
  <text x="365" y="345" class="label">517</text>

  <rect x="435" y="270" width="95" height="85" class="gallery" rx="3"/>
  <text x="482" y="313" class="label">518</text>

  <!-- === BOTTOM SECTION === -->
  <rect x="20" y="450" width="25" height="110" class="gallery-geffen" rx="3"/>
  <text x="32" y="505" class="label" style="font-size:11px;" transform="rotate(-90,32,505)">515</text>

  <rect x="50" y="450" width="140" height="110" class="gallery-geffen" rx="3"/>
  <text x="120" y="505" class="label">514</text>

  <rect x="310" y="450" width="100" height="110" class="gallery" rx="3"/>
  <text x="360" y="505" class="label">519</text>

  <rect x="415" y="450" width="90" height="110" class="gallery" rx="3"/>
  <text x="460" y="505" class="label">520</text>

  <rect x="510" y="450" width="80" height="110" class="gallery" rx="3"/>
  <text x="550" y="505" class="label">521</text>

  <rect x="415" y="395" width="110" height="50" class="gallery" rx="3"/>
  <text x="470" y="420" class="label">522</text>

  <rect x="580" y="355" width="85" height="100" class="gallery" rx="3"/>
  <text x="622" y="405" class="label">523</text>

  <!-- Wing labels -->
  <text x="145" y="570" class="wing-label">DAVID GEFFEN WING 508–515</text>
  <text x="490" y="16" class="wing-label">ALFRED H. BARR, JR. GALLERIES 501–507, 517–523</text>

  <!-- Escalator -->
  <g transform="translate(590,310)">
    <rect width="40" height="25" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1" rx="3"/>
    <text x="20" y="14" class="wing-label" style="fill:#4caf50; font-size:8px;">↗ F6</text>
  </g>
</svg>
