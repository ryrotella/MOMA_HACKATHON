<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" width="780" height="580">
  <style>
    .gallery { fill: #B8CCE4; stroke: #2a2a2a; stroke-width: 1.5; rx: 3; }
    .gallery-geffen { fill: #9BB8D8; stroke: #2a2a2a; stroke-width: 1.5; rx: 3; }
    .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #2a2a2a; text-anchor: middle; dominant-baseline: central; }
    .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #888; text-anchor: middle; }
    .floor-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 42px; font-weight: 900; fill: #ddd; }
    .wing-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #aaa; letter-spacing: 0.5px; }
    .outline { fill: #f8f6f3; stroke: #ccc; stroke-width: 1; }
    .corridor { fill: #eee; }
    .atrium { fill: #f5ecd0; stroke: #b8a87a; stroke-width: 1; }
  </style>

  <rect width="780" height="580" fill="#fafafa" rx="8"/>
  <text x="700" y="560" class="floor-label">2</text>

  <rect x="15" y="20" width="750" height="540" class="outline" rx="4"/>

  <!-- === TOP ROW === -->
  <rect x="20" y="25" width="140" height="110" class="gallery-geffen" rx="3"/>
  <text x="90" y="80" class="label">207</text>

  <rect x="165" y="25" width="120" height="110" class="gallery-geffen" rx="3"/>
  <text x="225" y="80" class="label">206</text>

  <rect x="310" y="25" width="65" height="110" class="gallery" rx="3"/>
  <text x="342" y="80" class="label">205</text>

  <rect x="380" y="25" width="85" height="110" class="gallery" rx="3"/>
  <text x="422" y="80" class="label">203</text>

  <rect x="470" y="25" width="95" height="110" class="gallery" rx="3"/>
  <text x="518" y="80" class="label">204</text>

  <!-- === SECOND ROW === -->
  <rect x="380" y="145" width="85" height="100" class="gallery" rx="3"/>
  <text x="422" y="195" class="label">202</text>

  <rect x="470" y="145" width="95" height="100" class="gallery" rx="3"/>
  <text x="518" y="195" class="label">201</text>

  <!-- Creativity Lab -->
  <rect x="585" y="25" width="120" height="110" class="atrium" rx="3"/>
  <text x="645" y="72" class="label-sm" style="fill:#999;">Creativity</text>
  <text x="645" y="88" class="label-sm" style="fill:#999;">Lab</text>

  <!-- === LEFT COLUMN === -->
  <rect x="20" y="180" width="140" height="100" class="gallery-geffen" rx="3"/>
  <text x="90" y="230" class="label">208</text>

  <!-- 216 -->
  <rect x="310" y="250" width="65" height="70" class="atrium" rx="3"/>
  <text x="342" y="285" class="label">216</text>

  <!-- Atrium -->
  <rect x="380" y="290" width="140" height="110" class="atrium" rx="3"/>
  <text x="450" y="345" class="label-sm" style="fill:#999;">Atrium</text>

  <!-- 215 -->
  <rect x="310" y="325" width="65" height="100" class="gallery" rx="3"/>
  <text x="342" y="375" class="label">215</text>

  <!-- 209 -->
  <rect x="20" y="325" width="210" height="120" class="gallery-geffen" rx="3"/>
  <text x="125" y="385" class="label">209</text>

  <!-- === BOTTOM ROW === -->
  <rect x="20" y="450" width="85" height="110" class="gallery-geffen" rx="3"/>
  <text x="63" y="505" class="label">210</text>

  <rect x="110" y="450" width="75" height="110" class="gallery-geffen" rx="3"/>
  <text x="148" y="505" class="label">211</text>

  <rect x="190" y="450" width="85" height="110" class="gallery-geffen" rx="3"/>
  <text x="232" y="505" class="label">212</text>

  <rect x="340" y="450" width="85" height="110" class="gallery" rx="3"/>
  <text x="382" y="505" class="label">213</text>

  <rect x="430" y="450" width="85" height="110" class="gallery" rx="3"/>
  <text x="472" y="505" class="label">214</text>

  <!-- 2 South -->
  <rect x="560" y="430" width="140" height="90" class="atrium" rx="3"/>
  <text x="630" y="475" class="label-sm" style="fill:#999;">2 South</text>

  <!-- Wing labels -->
  <text x="120" y="570" class="wing-label">DAVID GEFFEN WING 206–211</text>
</svg>
