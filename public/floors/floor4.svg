  <rect x="20" y="145" width="95" height="95" class="gallery-geffen" rx="3"/>
  <text x="68" y="193" class="label">411</text>

  <rect x="120" y="145" width="130" height="95" class="gallery-geffen" rx="3"/>
  <text x="185" y="193" class="label">410</text>

  <rect x="20" y="270" width="105" height="120" class="gallery-geffen" rx="3"/>
