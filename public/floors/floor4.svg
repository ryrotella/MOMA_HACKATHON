  <text x="560" y="495" class="label">420</text>

  <rect x="610" y="430" width="80" height="130" class="gallery" rx="3"/>
  <text x="650" y="495" class="label">421</text>

  <!-- Studio -->
  <rect x="140" y="455" width="100" height="105" class="studio" rx="3"/>
  <text x="190" y="508" class="label-sm" style="fill:#999;">Studio</text>

  <!-- Wing labels -->
  <text x="80" y="570" class="wing-label">DAVID GEFFEN WING 408–413</text>
  <text x="490" y="16" class="wing-label">DAVID GEFFEN GALLERIES 401–407, 415–421</text>
</svg>
