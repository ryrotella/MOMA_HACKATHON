  <rect x="20" y="455" width="115" height="105" class="gallery-geffen" rx="3"/>
  <text x="78" y="508" class="label">413</text>

  <!-- === CENTER === -->
  <rect x="305" y="220" width="75" height="75" class="gallery" rx="3"/>
  <text x="342" y="255" class="label" style="font-size:14px;">406A</text>

  <rect x="385" y="220" width="75" height="75" class="gallery" rx="3"/>
  <text x="422" y="255" class="label" style="font-size:14px;">406B</text>

  <rect x="180" y="310" width="135" height="120" class="gallery" rx="3"/>
  <text x="248" y="370" class="label">414</text>

  <rect x="320" y="325" width="90" height="100" class="gallery" rx="3"/>
  <text x="365" y="375" class="label">415</text>

  <rect x="460" y="270" width="90" height="85" class="gallery" rx="3"/>
  <text x="505" y="313" class="label">416</text>

